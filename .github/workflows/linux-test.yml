name: Linux tests (NFStream + Scapy + model)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (including NFStream — Linux wheels)
        run: |
          pip install -r requirements.txt
          pip install scapy nfstream

      - name: CLI prediction pipeline (mock flows)
        run: python test_pipeline.py

      - name: PDF security report generation
        run: python test_pdf_report.py

      - name: Generate synthetic test capture
        run: python make_test_pcap.py

      - name: Scapy fallback engine on PCAP
        run: |
          python - <<'EOF'
          from packet_engine import read_pcap
          from feature_extractor import FeatureExtractor
          ex = FeatureExtractor()
          flows = read_pcap('data/test_traffic.pcap')
          assert len(flows) >= 10, f"expected >=10 flows, got {len(flows)}"
          preds = [ex.predict_flow(f) for f in flows]
          print(f"Scapy engine: {len(flows)} flows, "
                f"{sum(p['label'] for p in preds)} flagged as attacks")
          EOF

      - name: NFStream engine on PCAP (Linux-only integration test)
        run: python linux_nfstream_test.py

      - name: App imports cleanly with NFStream present
        run: |
          python - <<'EOF'
          import nfstream, scapy, streamlit, xgboost, sklearn, altair
          print("nfstream", nfstream.__version__)
          print("All capture + ML + UI dependencies import correctly on Linux")
          EOF
